{% extends 'accounts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        <div class="card shadow-sm border-dark">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Enroll in a Batch</h4>
                <a href="{% url 'enrollment_list' %}" class="btn btn-sm btn-outline-light">My Enrollments</a>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-end mt-4">
                        <a href="{% url 'enrollment_list' %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-success">Enroll Now</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
