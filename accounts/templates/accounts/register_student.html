{% extends 'accounts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-lg mx-auto py-12">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-emerald-500 to-emerald-700 px-6 py-5 text-center">
            <h4 class="text-white text-2xl font-bold tracking-wide flex justify-center items-center">
                <i class="bi bi-mortarboard mr-3 text-emerald-200"></i> Student Registration
            </h4>
        </div>
        <div class="p-8">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="font-medium text-sm text-gray-800">
                    {{ form|crispy }}
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-lg py-3 rounded-xl transition-all shadow-md hover:shadow-lg focus:ring-4 focus:ring-emerald-300">
                    Create Student Account
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm">Already registered? 
                    <a href="{% url 'login' %}" class="text-emerald-600 hover:text-emerald-800 font-bold ml-1 hover:underline">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
