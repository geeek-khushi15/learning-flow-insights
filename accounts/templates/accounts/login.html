{% extends 'accounts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-brand-600 to-brand-800 px-6 py-5 text-center">
            <h4 class="text-white text-2xl font-bold tracking-wide flex justify-center items-center">
                <i class="bi bi-box-arrow-in-right mr-3 text-brand-200"></i> Portal Login
            </h4>
        </div>
        <div class="p-8">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="font-medium text-sm text-gray-800">
                    {{ form|crispy }}
                </div>
                <button type="submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold text-lg py-3 rounded-xl transition-all shadow-md hover:shadow-lg focus:ring-4 focus:ring-brand-300">
                    Sign In to Continue
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 text-sm">Don't have an account? 
                    <a href="{% url 'student_register' %}" class="text-brand-600 hover:text-brand-800 font-bold ml-1 hover:underline">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
