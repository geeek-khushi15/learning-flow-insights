{% extends 'accounts/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm border-primary mb-4">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">{{ test.title }}</h4>
                <span class="badge bg-light text-dark">Passing: {{ test.passing_marks }} Marks</span>
            </div>

            <div class="card-body bg-light">
                <form method="post">
                    {% csrf_token %}

                    {% for q in questions %}
                    <div class="card mb-4 border-0 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">Q{{ forloop.counter }}. {{ q.text }}</h5>
                            <hr>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}"
                                    id="q{{ q.id }}_opt1" value="1" required>
                                <label class="form-check-label" for="q{{ q.id }}_opt1">{{ q.option1 }}</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}"
                                    id="q{{ q.id }}_opt2" value="2" required>
                                <label class="form-check-label" for="q{{ q.id }}_opt2">{{ q.option2 }}</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}"
                                    id="q{{ q.id }}_opt3" value="3" required>
                                <label class="form-check-label" for="q{{ q.id }}_opt3">{{ q.option3 }}</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}"
                                    id="q{{ q.id }}_opt4" value="4" required>
                                <label class="form-check-label" for="q{{ q.id }}_opt4">{{ q.option4 }}</label>
                            </div>
                        </div>
                    </div>
                    {% endfor %}

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Submit Test</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
